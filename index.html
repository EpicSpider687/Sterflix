<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterflix | Asset Index</title>
    <style>
        :root {
            --purple-gradient: linear-gradient(135deg, #9d2bb3, #4b0082);
            --gui-bg: rgba(0, 0, 0, 0.65);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Inter', sans-serif;
            background: #000 url('https://assets.sterflix.com/assets/Sterflix-Backround.jpg') center/cover no-repeat fixed;
            color: white;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .header {
            max-width: 1000px;
            margin: 0 auto 30px;
            background: var(--gui-bg);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        h1 {
            background: var(--purple-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .search-box {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 15px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            font-size: 1rem;
        }

        .asset-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .asset-card {
            background: var(--gui-bg);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            text-align: center;
            transition: transform 0.3s ease;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .asset-card:hover { transform: translateY(-5px); border-color: #9d2bb3; }

        .preview-box {
            width: 100%;
            height: 140px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview-box img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        /* Icon for non-image files */
        .file-icon { font-size: 3rem; opacity: 0.5; }

        .asset-name { font-size: 0.85rem; color: #ccc; margin-bottom: 10px; word-break: break-all; height: 2.5rem; overflow: hidden; }

        .copy-link {
            background: var(--purple-gradient);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }

        .copy-link:hover { opacity: 0.9; }
        .loading { text-align: center; font-size: 1.2rem; opacity: 0.7; grid-column: 1/-1; padding: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Asset Explorer</h1>
        <input type="text" class="search-box" placeholder="Filter assets..." id="search">
    </div>

    <div class="asset-grid" id="asset-grid">
        <div class="loading">Fetching assets...</div>
    </div>

    <script>
        // CONFIGURATION: Change these to match your GitHub repo
        const USERNAME = 'YOUR_GITHUB_USERNAME'; 
        const REPO = 'YOUR_REPO_NAME';
        const FOLDER_PATH = 'assets'; 

        async function fetchAssets() {
            const grid = document.getElementById('asset-grid');
            try {
                // GitHub API URL to list folder contents
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FOLDER_PATH}`);
                const files = await response.json();

                grid.innerHTML = ''; // Clear loading message

                files.forEach(file => {
                    if (file.type === 'file' && file.name !== 'index.html') {
                        const isImage = /\.(jpg|jpeg|png|gif|svg|webp)$/i.test(file.name);
                        const rawUrl = `https://${USERNAME}.github.io/${REPO}/${FOLDER_PATH}/${file.name}`;

                        const card = document.createElement('div');
                        card.className = 'asset-card';
                        card.innerHTML = `
                            <div class="preview-box">
                                ${isImage ? `<img src="${rawUrl}" loading="lazy">` : `<span class="file-icon">📄</span>`}
                            </div>
                            <p class="asset-name">${file.name}</p>
                            <button class="copy-link" onclick="copyUrl('${rawUrl}', this)">Copy Direct URL</button>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (error) {
                grid.innerHTML = `<div class="loading">Error loading assets. Check your username/repo config.</div>`;
            }
        }

        function copyUrl(url, btn) {
            navigator.clipboard.writeText(url);
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            btn.style.background = "#28a745";
            setTimeout(() => { 
                btn.innerText = originalText; 
                btn.style.background = ""; 
            }, 1500);
        }

        document.getElementById('search').addEventListener('input', function(e) {
            let term = e.target.value.toLowerCase();
            document.querySelectorAll('.asset-card').forEach(card => {
                let name = card.querySelector('.asset-name').innerText.toLowerCase();
                card.style.display = name.includes(term) ? 'block' : 'none';
            });
        });

        fetchAssets();
    </script>
</body>
</html>
