<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterflix | Asset Index</title>
    <style>
        :root {
            --purple-gradient: linear-gradient(135deg, #9d2bb3, #4b0082);
            --gui-bg: rgba(0, 0, 0, 0.65);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Inter', sans-serif;
            background: #000 url('https://EpicSpider687.github.io/Sterflix-Assets/assets/Sterflix-Backround.jpg') center/cover no-repeat fixed;
            color: white;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .header {
            max-width: 1000px;
            margin: 0 auto 30px;
            background: var(--gui-bg);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        h1 {
            background: var(--purple-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .search-box {
            width: 100%;
            max-width: 500px;
            padding: 15px 25px;
            border-radius: 20px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }
        .search-box:focus { background: rgba(255,255,255,0.15); box-shadow: 0 0 15px rgba(157, 43, 179, 0.3); }

        .asset-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .asset-card {
            background: var(--gui-bg);
            backdrop-filter: blur(8px);
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .asset-card:hover { transform: translateY(-5px); border-color: #9d2bb3; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        .preview-box {
            width: 100%;
            height: 140px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview-box img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .file-icon { font-size: 3rem; opacity: 0.5; }
        .asset-name { font-size: 0.85rem; color: #eee; margin-bottom: 15px; word-break: break-all; height: 2.5rem; overflow: hidden; font-weight: 500; }

        .copy-link {
            background: var(--purple-gradient);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .copy-link:hover { filter: brightness(1.2); }
        .copy-link:active { transform: scale(0.95); }

        .loading { text-align: center; font-size: 1.2rem; opacity: 0.7; grid-column: 1/-1; padding: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Asset Explorer</h1>
        <input type="text" class="search-box" placeholder="Search for an asset..." id="search-input">
    </div>

    <div class="asset-grid" id="asset-grid">
        <div class="loading">Scanning Sterflix-Assets...</div>
    </div>

    <script>
        const USERNAME = 'EpicSpider687'; 
        const REPO = 'Sterflix-Assets';
        const FOLDER_PATH = 'assets'; 

        async function fetchAssets() {
            const grid = document.getElementById('asset-grid');
            try {
                // Fetching from main branch explicitly
                const apiUrl = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FOLDER_PATH}?ref=main`;
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error(`Status ${response.status}: Check if repo is Public.`);
                }

                const files = await response.json();
                console.log("Files found:", files); // Look at your browser console (F12) to see this
                
                grid.innerHTML = ''; 

                files.forEach(file => {
                    if (file.type === 'file' && file.name !== 'index.html') {
                        const isImage = /\.(jpg|jpeg|png|gif|svg|webp)$/i.test(file.name);
                        const publicUrl = `https://${USERNAME}.github.io/${REPO}/${FOLDER_PATH}/${file.name}`;

                        const card = document.createElement('div');
                        card.className = 'asset-card';
                        card.innerHTML = `
                            <div class="preview-box">
                                ${isImage ? `<img src="${file.download_url}" loading="lazy">` : `<span class="file-icon">📄</span>`}
                            </div>
                            <p class="asset-name">${file.name}</p>
                            <button class="copy-link" onclick="copyUrl('${publicUrl}', this)">COPY URL</button>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (error) {
                grid.innerHTML = `<div class="loading">Error: ${error.message}</div>`;
            }
        }

        function copyUrl(url, btn) {
            navigator.clipboard.writeText(url);
            const oldText = btn.innerText;
            btn.innerText = "COPIED!";
            btn.style.background = "#28a745";
            setTimeout(() => {
                btn.innerText = oldText;
                btn.style.background = "";
            }, 1500);
        }

        // Search Filter Logic
        document.getElementById('search-input').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.asset-card');
            cards.forEach(card => {
                const name = card.querySelector('.asset-name').innerText.toLowerCase();
                card.style.display = name.includes(term) ? 'block' : 'none';
            });
        });

        fetchAssets();
    </script>
</body>
</html>
